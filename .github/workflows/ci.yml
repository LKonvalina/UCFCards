name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server-tests:
    name: Server (Jest + Supertest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit and API tests
        run: npm run test:ci
        env:
          NODE_ENV: test

  client-tests:
    name: Client (Vitest + TypeScript build)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Run unit tests
        run: npm test
        working-directory: client

      - name: Build production bundle
        run: npm run build
        working-directory: client
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
          VITE_API_URL: https://example.com/api
          VITE_SOCKET_URL: https://example.com

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - server-tests
      - client-tests
    if: always()

    steps:
      - name: Report breaking changes
        run: |
          if [ "${{ needs.server-tests.result }}" != "success" ] || [ "${{ needs.client-tests.result }}" != "success" ]; then
            echo "::error::CI failed. A push or pull request introduced breaking test or build failures."
            exit 1
          fi

          echo "All CI checks passed."
